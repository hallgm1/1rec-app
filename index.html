<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRA Receipt Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { background: #333; margin: 0; padding: 10px; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; }
        .form-container { 
            background: #fff; padding: 15px; width: 100%; max-width: 400px; 
            margin-bottom: 20px; border-radius: 10px; box-sizing: border-box;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        h3 { margin: 0 0 15px 0; color: #2c3e50; border-bottom: 2px solid #eee; padding-bottom: 5px; }
        .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        label { font-size: 11px; font-weight: bold; color: #555; text-transform: uppercase; display: block; margin-top: 8px; }
        input { width: 100%; padding: 8px; margin: 4px 0; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; font-size: 13px; }
        
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 15px; }
        button { padding: 12px; font-weight: bold; border: none; border-radius: 5px; cursor: pointer; color: white; }
        .btn-update { background: #3498db; grid-column: span 2; }
        .btn-print { background: #27ae60; }
        .btn-save { background: #e67e22; }

        /* Receipt Design */
        #receipt-area { 
            width: 320px; background: white; padding: 25px; color: #000;
            font-family: 'Courier New', Courier, monospace; font-size: 13px; line-height: 1.3;
        }
        .center { text-align: center; }
        .bold { font-weight: bold; }
        .dashed-line { border-bottom: 1px dashed #000; margin: 10px 0; }
        .item-row { display: flex; justify-content: space-between; margin: 4px 0; }
        #qrcode { display: flex; justify-content: center; margin: 15px 0; min-height: 130px; }

        @media print {
            .form-container { display: none !important; }
            body { background: white; padding: 0; }
        }
    </style>
</head>
<body>

<div class="form-container">
    <h3>Receipt Settings</h3>
    
    <label>Business Name</label>
    <input type="text" id="in-biz-name" value="METRO AGRO MACHINERY & SPARES LTD">
    
    <label>Business Address</label>
    <input type="text" id="in-biz-addr" value="P O BOX 79790 MOROGORO">
    
    <div class="input-row">
        <div>
            <label>Business TIN</label>
            <input type="text" id="in-biz-tin" value="101840182">
        </div>
        <div>
            <label>Business VRN</label>
            <input type="text" id="in-biz-vrn" value="10016208N">
        </div>
    </div>

    <label>Customer Name</label>
    <input type="text" id="in-cust-name" value="WILLIAM MATHAYO GENDO">

    <div class="input-row">
        <div>
            <label>Item Name</label>
            <input type="text" id="in-item" value="BRAKE BOOSTER">
        </div>
        <div>
            <label>Price (TZS)</label>
            <input type="number" id="in-price" value="300000">
        </div>
    </div>

    <label>Verification Code</label>
    <input type="text" id="in-code" value="479B0636765">
    
    <div class="btn-group">
        <button class="btn-update" onclick="updateReceipt()">REFRESH PREVIEW</button>
        <button class="btn-print" onclick="window.print()">PRINT</button>
        <button class="btn-save" onclick="saveAsImage()">SAVE IMAGE</button>
    </div>
</div>

<div id="receipt-area">
    <div class="center bold">*** START OF LEGAL RECEIPT ***</div>
    
    <div class="center" style="margin: 10px 0;">
        <span id="disp-biz-name" class="bold"></span><br>
        <span id="disp-biz-addr"></span><br>
        TEL +255 783 290 717<br>
        TANZANIA
    </div>

    <div class="center">
        TIN: <span id="disp-biz-tin"></span> | VRN: <span id="disp-biz-vrn"></span><br>
        S/N: 03TZ843006014
    </div>

    <div class="dashed-line"></div>

    <div>
        CUSTOMER: <span id="disp-cust-name"></span><br>
        ID TYPE: BUYER'S TIN | <span id="disp-cust-id">321459636</span>
    </div>

    <div class="dashed-line"></div>

    <div class="item-row">
        <span id="disp-date"></span>
        <span id="disp-time"></span>
    </div>

    <div class="dashed-line"></div>

    <div class="item-row bold">
        <span id="disp-item"></span>
        <span><span id="disp-total-row"></span> E</span>
    </div>

    <div class="item-row">
        <span>TOTAL EXCL. TAX</span>
        <span id="disp-excl"></span>
    </div>
    
    <div class="center bold" style="font-size: 28px; margin: 15px 0;" id="disp-total-big"></div>

    <div class="dashed-line"></div>

    <div class="center">
        VERIFICATION CODE<br>
        <span class="bold" id="disp-code"></span>
    </div>

    <div id="qrcode"></div>

    <div class="center bold">*** END OF LEGAL RECEIPT ***</div>
    
    <div class="center" style="font-size: 10px; margin-top:10px;">
        Changamoto kwenye risiti piga<br>bure TRA 0800750254 /0800754255
    </div>
</div>

<script>
    var qrcode = new QRCode(document.getElementById("qrcode"), { width: 135, height: 135 });

    function updateReceipt() {
        // Business Info
        document.getElementById('disp-biz-name').innerText = document.getElementById('in-biz-name').value.toUpperCase();
        document.getElementById('disp-biz-addr').innerText = document.getElementById('in-biz-addr').value.toUpperCase();
        document.getElementById('disp-biz-tin').innerText = document.getElementById('in-biz-tin').value;
        document.getElementById('disp-biz-vrn').innerText = document.getElementById('in-biz-vrn').value;

        // Customer & Item Info
        document.getElementById('disp-cust-name').innerText = document.getElementById('in-cust-name').value.toUpperCase();
        document.getElementById('disp-item').innerText = document.getElementById('in-item').value.toUpperCase();

        var total = parseFloat(document.getElementById('in-price').value) || 0;
        var formatted = total.toLocaleString('en-US', {minimumFractionDigits: 2});
        document.getElementById('disp-total-row').innerText = formatted;
        document.getElementById('disp-total-big').innerText = formatted;
        document.getElementById('disp-excl').innerText = (total / 1.18).toLocaleString('en-US', {minimumFractionDigits: 2});

        // Verification Info
        var code = document.getElementById('in-code').value;
        document.getElementById('disp-code').innerText = code.toUpperCase();

        var now = new Date();
        document.getElementById('disp-date').innerText = now.toLocaleDateString('en-GB').replace(/\//g, '-');
        document.getElementById('disp-time').innerText = now.toLocaleTimeString('en-GB');

        qrcode.clear();
        qrcode.makeCode("https://verify.tra.go.tz/" + code);
    }

    function saveAsImage() {
        updateReceipt();
        setTimeout(() => {
            html2canvas(document.querySelector("#receipt-area"), { scale: 3 }).then(canvas => {
                let link = document.createElement('a');
                link.download = 'Receipt-' + document.getElementById('in-cust-name').value + '.png';
                link.href = canvas.toDataURL();
                link.click();
            });
        }, 200);
    }

    window.onload = updateReceipt;
</script>

</body>
</html>
